<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI.INSIGHTS // Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/images/favicon.ico">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: {
                            black: '#030712',
                            primary: '#6366f1',
                            secondary: '#a855f7',
                            accent: '#22d3ee'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="bg-brand-black text-slate-300 h-screen flex flex-col font-sans overflow-hidden">
    <!-- Background Glows -->
    <div class="fixed top-0 left-1/4 w-[500px] h-[500px] bg-brand-primary/5 blur-[120px] -z-10"></div>
    <div class="fixed bottom-0 right-1/4 w-[500px] h-[500px] bg-brand-secondary/5 blur-[120px] -z-10"></div>

    <nav class="glass border-b border-white/5 h-20 flex-shrink-0">
        <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter text-white flex items-center gap-2">
                <div class="w-8 h-8 bg-gradient-to-br from-brand-primary to-brand-secondary rounded-lg flex items-center justify-center">
                    <div class="w-4 h-4 bg-brand-black rounded-sm rotate-45"></div>
                </div>
                AI<span class="text-brand-accent">.</span>INSIGHTS
            </a>
            <div class="flex items-center gap-6">
                <a href="aisites.html" class="px-4 py-2 glass border-white/10 text-xs font-bold uppercase tracking-widest text-brand-accent rounded-xl">Directory</a>
                <a href="index.html" class="text-sm font-semibold text-slate-500 hover:text-white transition-colors flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Disconnect
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-4xl w-full mx-auto p-6 flex flex-col min-h-0">
        <div id="chat-display" class="flex-1 overflow-y-auto pr-4 custom-scrollbar space-y-8 pb-8">
            <!-- Bot Message -->
            <div class="flex gap-5">
                <div class="w-10 h-10 rounded-2xl bg-brand-primary/10 border border-brand-primary/20 flex items-center justify-center flex-shrink-0">
                    <span class="text-brand-primary text-xs font-black tracking-tighter">AI</span>
                </div>
                <div class="glass p-6 rounded-3xl rounded-tl-none max-w-[85%] border-l-2 border-brand-primary shadow-2xl">
                    <p class="text-[0.95rem] leading-relaxed text-slate-300 font-medium">Neural link active. I am the AI.INSIGHTS core processing unit. How can I facilitate your research into neural architectures today?</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="mt-8 mb-4">
            <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-brand-primary to-brand-secondary rounded-[2.5rem] blur opacity-10 group-focus-within:opacity-30 transition-opacity"></div>
                <div class="relative flex items-center glass rounded-[2rem] p-2 pr-4 shadow-2xl">
                    <input type="text" id="chat-input" 
                           class="w-full bg-transparent border-none outline-none px-6 py-4 text-white placeholder-slate-600 font-semibold" 
                           placeholder="Query the core..." autocomplete="off">
                    <button id="send-btn" class="bg-brand-primary text-white px-8 py-3 rounded-2xl font-black hover:bg-brand-secondary transition-all shadow-lg shadow-brand-primary/20">
                        TRANSMIT
                    </button>
                </div>
            </div>
            <div class="flex justify-between items-center px-6 mt-4">
                <p class="text-[0.65rem] text-slate-600 font-black uppercase tracking-[0.4em]">Protocol // Secure Link</p>
                <p class="text-[0.65rem] text-slate-600 font-black uppercase tracking-[0.4em]">Inference Engine // v3.0</p>
            </div>
        </div>
    </main>

    <script>
        const chatDisplay = document.getElementById('chat-display');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const BACKEND_URL = "http://127.0.0.1:8000/api/chat";

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || sendBtn.disabled) return;

            displayMessage(message, 'user');
            chatInput.value = '';
            
            sendBtn.disabled = true;
            const loadingMsg = displayMessage("Processing inference...", 'bot');
            
            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) throw new Error();

                const data = await response.json();
                loadingMsg.querySelector('.msg-text').innerHTML = data.response
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>');

            } catch (error) {
                loadingMsg.querySelector('.msg-text').innerHTML = "<strong class='text-brand-secondary'>Link Error:</strong> Core connection lost. Verify backend protocol status.";
            } finally {
                sendBtn.disabled = false;
                chatDisplay.scrollTop = chatDisplay.scrollHeight;
            }
        }

        function displayMessage(message, type) {
            const div = document.createElement('div');
            div.className = `flex gap-5 animate-in fade-in slide-in-from-bottom-2 duration-500 ${type === 'user' ? 'flex-row-reverse' : ''}`;
            
            if (type === 'user') {
                div.innerHTML = `
                    <div class="w-10 h-10 rounded-2xl bg-white text-brand-black flex items-center justify-center flex-shrink-0 font-black text-xs">U</div>
                    <div class="bg-brand-primary p-6 rounded-3xl rounded-tr-none max-w-[85%] shadow-xl">
                        <p class="msg-text text-[0.95rem] leading-relaxed text-white font-semibold">${message}</p>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="w-10 h-10 rounded-2xl bg-brand-primary/10 border border-brand-primary/20 flex items-center justify-center flex-shrink-0 font-black text-xs text-brand-primary">AI</div>
                    <div class="glass p-6 rounded-3xl rounded-tl-none max-w-[85%] border-l-2 border-brand-primary shadow-2xl">
                        <p class="msg-text text-[0.95rem] leading-relaxed text-slate-300 font-medium">${message}</p>
                    </div>
                `;
            }
            
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            return div;
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
